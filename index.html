<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solink Workspace</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --panel: #fffdf8;
      --ink: #171713;
      --muted: #6f6a5e;
      --line: #d9d1c2;
      --accent: #0f7f72;
      --blue: #275c91;
      --shadow: 0 10px 30px rgba(35, 29, 18, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.45 "Segoe UI", Arial, sans-serif;
    }
    a { color: inherit; text-decoration: none; }
    .shell { min-height: 100vh; display: grid; grid-template-rows: 64px 1fr; }
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 248, .94);
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .workspace-home {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 240px;
      border: 0;
      padding: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }
    .mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--accent);
      color: white;
      font-weight: 800;
    }
    .title { min-width: 0; display: grid; gap: 3px; }
    .workspace-name { font-size: 20px; line-height: 1.1; font-weight: 800; }
    .title #workspaceDate { color: var(--muted); font-size: 12px; }
    .search {
      flex: 1;
      max-width: 860px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 12px;
      background: white;
      font: inherit;
    }
    .status-strip {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-left: auto;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
    .layout {
      display: grid;
      grid-template-columns: 270px 1fr 320px;
      min-height: calc(100vh - 64px);
    }
    .sidebar, .rightbar {
      border-right: 1px solid var(--line);
      background: #fbf8f1;
      padding: 16px;
      overflow: auto;
    }
    .rightbar { border-right: 0; border-left: 1px solid var(--line); }
    .main { padding: 18px; overflow: auto; }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .section-title h2 { margin: 0; font-size: 16px; }
    .small { color: var(--muted); font-size: 12px; }
    .nav-list { display: grid; gap: 7px; }
    .nav-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 10px;
      border: 1px solid transparent;
      border-radius: 6px;
      font-weight: 700;
    }
    .nav-item.active {
      background: #dff0ec;
      border-color: #94c8bf;
      color: #083f39;
    }
    .badge {
      min-width: 34px;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 1px 6px;
      background: white;
      color: var(--muted);
      font-weight: 700;
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(260px, 1.2fr) minmax(240px, .8fr);
      gap: 16px;
      margin-bottom: 18px;
    }
    .mission, .metric, .project-card {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .mission { padding: 18px; }
    .mission h2 { margin: 0 0 8px; font-size: 24px; }
    .mission p { margin: 0; max-width: 760px; color: #39352d; font-size: 15px; }
    .telemetry { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .metric { padding: 13px; min-height: 82px; }
    .metric strong { display: block; font-size: 24px; line-height: 1; margin-bottom: 8px; }
    .metric span { color: var(--muted); font-size: 12px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
    .project-card { min-height: 220px; display: flex; flex-direction: column; gap: 12px; padding: 14px; }
    .project-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .project-head h3 { margin: 0; font-size: 18px; line-height: 1.2; }
    .status {
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .status.ok { background: #dff0ec; color: #0f5f55; }
    .status.agent { background: #dceafb; color: var(--blue); }
    .status.warn { background: #f7ebcc; color: #8a5a07; }
    .status.paused { background: #ece6da; color: #695f51; }
    .status.idea { background: #e8edf7; color: #31547c; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin: 0 0 14px; }
    .filter-button {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      padding: 7px 11px;
      font: inherit;
      font-weight: 700;
      color: #302b22;
      cursor: pointer;
    }
    .filter-button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .next {
      border-left: 3px solid var(--accent);
      padding-left: 10px;
      color: #312d26;
      min-height: 52px;
    }
    .components { display: grid; gap: 8px; }
    .component-item { display: grid; gap: 2px; padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px; background: #fffaf0; }
    .component-item strong { font-size: 13px; }
    .component-item span { color: var(--muted); font-size: 12px; }
    .project-overview {
      grid-column: 1 / -1;
      min-height: 0;
      display: grid;
      gap: 14px;
      padding: 16px;
    }
    .overview-lead {
      display: grid;
      gap: 8px;
      max-width: 980px;
    }
    .overview-lead h3 { margin: 0; font-size: 22px; }
    .overview-lead p { margin: 0; color: #39352d; line-height: 1.5; }
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      gap: 12px;
    }
    .overview-column {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffaf0;
      padding: 12px;
    }
    .overview-column h4 { margin: 0 0 10px; font-size: 16px; }
    .overview-column ul, .overview-column ol { margin: 0; padding-left: 18px; display: grid; gap: 8px; }
    .overview-column li { color: #383229; line-height: 1.35; }
    .overview-tools { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .done-link {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: white;
      color: #302b22;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 8px;
    }
    .done-link.active { background: var(--accent); border-color: var(--accent); color: white; }
    .add-task-button {
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 9px;
    }
    .column-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .column-head h4 { margin: 0; }
    .task-list { list-style-position: outside; }
    .task-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
    }
    .task-text { min-width: 0; }
    .task-actions { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
    .task-action {
      border: 1px solid var(--line);
      border-radius: 5px;
      background: white;
      color: #302b22;
      cursor: pointer;
      font: inherit;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 6px;
    }
    .task-action.done { background: #dff0ec; color: #0f5f55; }
    .task-action.archive { background: #ece6da; color: #695f51; }
    .indicator-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .indicator-list li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid rgba(214, 205, 191, .7);
      padding-bottom: 7px;
    }
    .indicator-list strong { font-size: 18px; }
    .progress-track {
      height: 8px;
      border-radius: 999px;
      background: #ece6da;
      overflow: hidden;
      margin: 8px 0 10px;
    }
    .progress-fill { height: 100%; background: var(--accent); }
    .task-dialog::backdrop { background: rgba(32, 27, 19, .28); }
    .task-dialog {
      width: min(720px, calc(100vw - 28px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 0 18px 50px rgba(52, 43, 31, .28);
      color: var(--text);
      padding: 0;
    }
    .task-dialog form { display: grid; gap: 12px; padding: 16px; }
    .dialog-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .dialog-head h3 { margin: 0; font-size: 18px; }
    .dialog-close {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      padding: 5px 8px;
    }
    .task-editor {
      min-height: 150px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--text);
      font: inherit;
      line-height: 1.45;
      padding: 12px;
    }
    .dialog-tools { display: flex; gap: 8px; flex-wrap: wrap; }
    .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
    .voice-button.listening { background: #dff0ec; border-color: var(--accent); color: #0f5f55; }
    .overview-components {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 10px;
    }
    .overview-component {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: white;
      color: inherit;
      font: inherit;
      text-align: left;
    }
    button.overview-component { cursor: pointer; }
    button.overview-component:hover { border-color: var(--accent); box-shadow: 0 8px 18px rgba(17, 119, 103, .12); }
    .overview-component strong { display: block; margin-bottom: 5px; font-size: 15px; }
    .overview-component span { color: var(--muted); line-height: 1.4; }
    .meta { display: grid; gap: 6px; margin-top: auto; color: var(--muted); font-size: 12px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      padding: 7px 10px;
      font-weight: 700;
      color: #302b22;
    }
    .button.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .timeline { display: grid; gap: 10px; }
    .event { border-left: 3px solid var(--line); padding-left: 10px; color: #403b33; }
    .event strong { display: block; margin-bottom: 2px; }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 220px 1fr; }
      .rightbar { display: none; }
      .hero { grid-template-columns: 1fr; }
      .overview-grid, .overview-components { grid-template-columns: 1fr; }
    }
    @media (max-width: 760px) {
      .shell { grid-template-rows: auto 1fr; }
      .topbar { flex-wrap: wrap; height: auto; padding: 10px 12px; }
      .workspace-home { flex: 1 1 calc(100% - 54px); min-width: 0; }
      .mark { width: 34px; height: 34px; }
      .title { flex: 1 1 auto; }
      .search { order: 3; flex: 1 1 100%; max-width: none; }
      .status-strip { order: 4; margin-left: 0; white-space: normal; }
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .main { padding: 12px; }
      .mission { padding: 14px; }
      .mission h2 { font-size: 20px; }
      .telemetry { grid-template-columns: 1fr; }
      .cards { grid-template-columns: minmax(0, 1fr); }
      .project-card { min-height: 0; }
      .project-head { flex-wrap: wrap; }
      .status { white-space: normal; }
    }
  </style>
</head>

      <input class="search" id="search" type="search" placeholder="Поиск по проектам, задачам и решениям">
      <div class="status-strip"><span class="dot"></span> Workspace online</div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <div class="section-title">
          <h2>Проекты</h2>
          <span class="small" id="projectCount">3 активных</span>
        </div>
        <nav class="nav-list" id="projectNav" aria-label="Проекты"></nav>

          </div>
          <div class="telemetry" id="metrics"></div>
        </section>

        <div class="section-title">
          <h2 id="projectSectionTitle">Активные проекты</h2>
          <span class="small">Источник: projects.json</span>
        </div>
        <div class="filters" id="projectFilters" aria-label="Фильтры проектов"></div>

        <section class="cards" id="projectCards"></section>
      </main>

      <aside class="rightbar">
        <div class="section-title">
          <h2>Решения</h2>
          <a class="small" href="DECISIONS_LOG_RU.md">журнал</a>
        </div>
        <div class="timeline" id="decisions"></div>
      </aside>
    </div>
  </div>
  <dialog class="task-dialog" id="taskDialog">
    <form method="dialog">
      <div class="dialog-head">
        <h3 id="taskDialogTitle">Новый пункт</h3>
        <button class="dialog-close" type="button" id="taskDialogClose" aria-label="Закрыть">×</button>
      </div>
      <textarea class="task-editor" id="taskEditor" placeholder="Надиктуй или введи пункт задачи"></textarea>
      <div class="dialog-tools">
        <button class="task-action voice-button" type="button" id="voiceButton">Микрофон</button>
        <button class="task-action" type="button" id="polishButton">Причесать текст</button>
      </div>
      <div class="dialog-actions">
        <button class="button" type="button" id="taskCancel">Отмена</button>
        <button class="button primary" type="submit" id="taskSave">Сохранить</button>
      </div>
    </form>
  </dialog>

};

    const filterLabels = {
      active: "Активные",
      all: "Все",
      paused: "Пауза",
      ideas: "Идеи",
      archive: "Архив"
    };
    let currentData = fallbackData;
    let currentFilter = "active";
    let currentQuery = "";
    let selectedProjectId = "";
    let selectedComponentId = "";
    let taskDialogContext = null;
    let recognition = null;

    const byId = (id) => document.getElementById(id);
    const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    })[char]);

    function renderMetrics(metrics) {
      byId("metrics").innerHTML = metrics.map((metric) => `
        <div class="metric"><strong>${escapeHtml(metric.value)}</strong><span>${escapeHtml(metric.label)}</span></div>
      `).join("");
    }

    function componentId(project, component, index) {
      return component.id || `${project.id || "project"}-${String(component.title || index).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || index}`;
    }

    function selectedProject(projects) {
      return projects.find((project) => project.id === selectedProjectId);
    }

    function selectedComponent(project) {
      if (!project || !selectedComponentId) return null;
      return (project.components || []).find((component, index) =>
        componentId(project, component, index) === selectedComponentId
      );
    }

    function overviewKey(project, parentProject = null) {
      return `solink.overview.${parentProject?.id || "root"}.${project.id || project.title}`;
    }

    function overviewState(project, parentProject = null) {
      const key = overviewKey(project, parentProject);
      const overview = project.overview || {};
      const fallback = {
        todo: [...(overview.todo || [])],
        done: [...(overview.done || [])],
        archive: [],
        showDone: false
      };
      try {
        const saved = JSON.parse(localStorage.getItem(key) || "null");
        if (!saved || !Array.isArray(saved.todo) || !Array.isArray(saved.done)) return fallback;
        return {
          todo: saved.todo,
          done: saved.done,
          archive: Array.isArray(saved.archive) ? saved.archive : [],
          showDone: Boolean(saved.showDone)
        };
      } catch {
        return fallback;
      }
    }

    function saveOverviewState(project, parentProject, state) {
      localStorage.setItem(overviewKey(project, parentProject), JSON.stringify(state));
    }

    function mutateOverviewState(project, parentProject, mutator) {
      const state = overviewState(project, parentProject);
      mutator(state);
      saveOverviewState(project, parentProject, state);
      render(currentData);
    }

    function normalizeTaskText(value) {
      const text = String(value || "")
        .replace(/\s+/g, " ")
        .replace(/\s+([,.;:!?])/g, "$1")
        .trim();
      if (!text) return "";
      return text.charAt(0).toLocaleUpperCase("ru") + text.slice(1);
    }

    function openTaskDialog(project, parentProject, mode, index = -1) {
      const state = overviewState(project, parentProject);
      const current = mode === "edit" ? state.todo[index] || "" : "";
      taskDialogContext = { project, parentProject, mode, index };
      byId("taskDialogTitle").textContent = mode === "edit" ? "Редактировать пункт" : "Добавить пункт";
      byId("taskEditor").value = current;
      byId("voiceButton").classList.remove("listening");
      byId("taskDialog").showModal();
      byId("taskEditor").focus();
    }

    function closeTaskDialog() {
      if (recognition) recognition.stop();
      byId("voiceButton").classList.remove("listening");
      byId("taskDialog").close();
      taskDialogContext = null;
    }

    function saveTaskDialog() {
      if (!taskDialogContext) return;
      const value = normalizeTaskText(byId("taskEditor").value);
      if (!value) return;
      const { project, parentProject, mode, index } = taskDialogContext;
      mutateOverviewState(project, parentProject, (draft) => {
        if (mode === "edit" && draft.todo[index]) draft.todo[index] = value;
        if (mode === "add") draft.todo.push(value);
      });
      closeTaskDialog();
    }

    function startVoiceInput() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        alert("В этом браузере микрофон для диктовки недоступен.");
        return;
      }
      recognition = new SpeechRecognition();
      recognition.lang = "ru-RU";
      recognition.interimResults = true;
      recognition.continuous = true;
      byId("voiceButton").classList.add("listening");
      recognition.onresult = (event) => {
        let text = "";
        for (let index = 0; index < event.results.length; index += 1) {
          text += event.results[index][0].transcript;
        }
        byId("taskEditor").value = normalizeTaskText(text);
      };
      recognition.onend = () => byId("voiceButton").classList.remove("listening");
      recognition.onerror = () => byId("voiceButton").classList.remove("listening");
      recognition.start();
    }

    function visibleProjects(projects) {
      const project = selectedProject(projects);
      const source = project
        ? (project.components || []).map((component, index) => ({
            id: componentId(project, component, index),
            title: component.title,
            badge: component.badge || "",
            status: component.status || "\u041f\u043e\u0434\u043f\u0440\u043e\u0435\u043a\u0442",
            statusClass: component.statusClass || "ok",
            momentum: component.momentum || project.momentum,
            folder: component.folder || project.folder,
            next: component.text || "",
            actions: component.actions || [],
            isComponent: true
          }))
        : (currentFilter === "all"
          ? projects
          : projects.filter((item) => (item.category || "active") === currentFilter));
      const query = currentQuery.trim().toLowerCase();
      if (!query) return source;
      return source.filter((item) => [
        item.title,
        item.status,
        item.momentum,
        item.folder,
        item.next,
        item.badge
      ].join(" ").toLowerCase().includes(query));
    }

    function renderFilters(projects) {
      const counts = projects.reduce((result, project) => {
        const category = project.category || "active";
        result[category] = (result[category] || 0) + 1;
        result.all += 1;
        return result;
      }, { all: 0, active: 0, paused: 0, ideas: 0, archive: 0 });
      byId("projectFilters").innerHTML = ["active", "all", "paused", "ideas", "archive"].map((filter) => `
        <button class="filter-button ${currentFilter === filter ? "active" : ""}" type="button" data-filter="${filter}">
          ${filterLabels[filter]} ${counts[filter] || 0}
        </button>
      `).join("");
      byId("projectFilters").querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => {
          currentFilter = button.dataset.filter;
          render(currentData);
        });
      });
    }

    function renderNav(projects) {
      const activeCount = projects.filter((project) => (project.category || "active") === "active").length;
      byId("projectCount").textContent = `${activeCount} \u0430\u043a\u0442\u0438\u0432\u043d\u044b\u0445`;
      byId("projectNav").innerHTML = projects.map((project) => `
        <a class="nav-item ${project.id === selectedProjectId ? "active" : ""}" href="#${escapeHtml(project.id || "")}" data-project-id="${escapeHtml(project.id || "")}">
          <span>${escapeHtml(project.title)}</span>
          <span class="badge">${escapeHtml(project.badge)}</span>
        </a>
      `).join("");
      byId("projectNav").querySelectorAll("[data-project-id]").forEach((link) => {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          const projectId = link.dataset.projectId;
          const project = currentData.projects.find((item) => item.id === projectId);
          if (!project) return;
          selectedProjectId = projectId;
          selectedComponentId = "";
          currentQuery = "";
          byId("search").value = "";
          render(currentData);
        });
      });
    }

    function renderProjectOverview(project, parentProject = null) {
      const overview = project.overview || {};
      const state = overviewState(project, parentProject);
      const total = state.todo.length + state.done.length;
      const progress = total ? Math.round((state.done.length / total) * 100) : 0;
      const todo = state.todo.map((item, index) => `
        <li>
          <div class="task-item">
            <span class="task-text">${escapeHtml(item)}</span>
            <span class="task-actions">
              <button class="task-action" type="button" data-task-action="edit" data-task-index="${index}">Ред.</button>
              <button class="task-action done" type="button" data-task-action="done" data-task-index="${index}">Готово</button>
              <button class="task-action archive" type="button" data-task-action="archive" data-task-index="${index}">Архив</button>
            </span>
          </div>
        </li>
      `).join("");
      const done = state.done.map((item) => `<li>${escapeHtml(item)}</li>`).join("");
      const components = (project.components || []).map((component, index) => `
        <button class="overview-component" type="button" data-component-id="${escapeHtml(componentId(project, component, index))}">
          <strong>${escapeHtml(component.title)}</strong>
          <span>${escapeHtml(component.text)}</span>
        </button>
      `).join("");
      const title = parentProject ? `${parentProject.title}: ${project.title}` : project.title;
      byId("projectCards").innerHTML = `
        <article class="project-card project-overview">
          <div class="project-head">
            <div class="overview-lead">
              <h3>${escapeHtml(title)}</h3>
              <p>${escapeHtml(overview.summary || project.next || "")}</p>
            </div>
            <div class="overview-tools">
              <button class="done-link ${state.showDone ? "active" : ""}" type="button" data-overview-action="toggle-done">Что уже сделано</button>
              <span class="status ${escapeHtml(project.statusClass || "ok")}">${escapeHtml(project.status)}</span>
            </div>
          </div>
          ${components ? `<div class="overview-components">${components}</div>` : ""}
          <div class="overview-grid">
            <section class="overview-column">
              <div class="column-head">
                <h4>${escapeHtml(overview.todoTitle || "\u0427\u0442\u043e \u0441\u0434\u0435\u043b\u0430\u0442\u044c")}</h4>
                <button class="add-task-button" type="button" data-overview-action="add-task">Добавить пункт</button>
              </div>
              <ol class="task-list">${todo}</ol>
            </section>
            <section class="overview-column">
              ${state.showDone ? `
                <h4>${escapeHtml(overview.doneTitle || "\u0427\u0442\u043e \u0443\u0436\u0435 \u0441\u0434\u0435\u043b\u0430\u043d\u043e")}</h4>
                <ul>${done || "<li>Пока нет отмеченных выполненных пунктов.</li>"}</ul>
              ` : `
                <h4>Индикаторы</h4>
                <div class="progress-track"><div class="progress-fill" style="width: ${progress}%"></div></div>
                <ul class="indicator-list">
                  <li><span>Готовность по списку</span><strong>${progress}%</strong></li>
                  <li><span>В работе</span><strong>${state.todo.length}</strong></li>
                  <li><span>Сделано</span><strong>${state.done.length}</strong></li>
                  <li><span>Архив</span><strong>${state.archive.length}</strong></li>
                </ul>
              `}
            </section>
          </div>
          <div class="meta">
            <span>Momentum: ${escapeHtml(project.momentum)}</span>
            <span>${project.folder || parentProject?.folder ? `\u041f\u0430\u043f\u043a\u0430: ${escapeHtml(project.folder || parentProject.folder)}` : "\u041f\u0430\u043f\u043a\u0430: \u043f\u043e\u043a\u0430 \u043d\u0435 \u043d\u0430\u0437\u043d\u0430\u0447\u0435\u043d\u0430"}</span>
          </div>
        </article>
      `;
      byId("projectCards").querySelectorAll("[data-component-id]").forEach((button) => {
        button.addEventListener("click", () => {
          selectedComponentId = button.dataset.componentId;
          currentQuery = "";
          byId("search").value = "";
          render(currentData);
        });
      });
      byId("projectCards").querySelector("[data-overview-action='toggle-done']")?.addEventListener("click", () => {
        mutateOverviewState(project, parentProject, (draft) => { draft.showDone = !draft.showDone; });
      });
      byId("projectCards").querySelector("[data-overview-action='add-task']")?.addEventListener("click", () => {
        openTaskDialog(project, parentProject, "add");
      });
      byId("projectCards").querySelectorAll("[data-task-action]").forEach((button) => {
        button.addEventListener("click", () => {
          const index = Number(button.dataset.taskIndex);
          const action = button.dataset.taskAction;
          if (action === "edit") {
            openTaskDialog(project, parentProject, "edit", index);
            return;
          }
          mutateOverviewState(project, parentProject, (draft) => {
            const item = draft.todo[index];
            if (!item) return;
            if (action === "done") {
              draft.todo.splice(index, 1);
              draft.done.unshift(item);
              draft.showDone = true;
            }
            if (action === "archive") {
              draft.todo.splice(index, 1);
              draft.archive.unshift(item);
            }
          });
        });
      });
    }

    function renderCards(projects) {
      const parent = selectedProject(currentData.projects || []);
      const component = selectedComponent(parent);
      byId("projectSectionTitle").textContent = parent
        ? (component ? `${parent.title}: ${component.title}` : parent.title)
        : `${filterLabels[currentFilter]} \u043f\u0440\u043e\u0435\u043a\u0442\u044b`;
      byId("projectFilters").style.display = parent ? "none" : "flex";
      if (component?.overview) {
        renderProjectOverview(component, parent);
        return;
      }
      if (parent?.overview) {
        renderProjectOverview(parent);
        return;
      }
      if (!projects.length) {
        byId("projectCards").innerHTML = `<article class="project-card"><div class="next">\u041f\u043e \u044d\u0442\u043e\u043c\u0443 \u0440\u0430\u0437\u0434\u0435\u043b\u0443 \u043f\u043e\u043a\u0430 \u043d\u0438\u0447\u0435\u0433\u043e \u043d\u0435 \u043d\u0430\u0439\u0434\u0435\u043d\u043e.</div></article>`;
        return;
      }
      byId("projectCards").innerHTML = projects.map((project) => {
        const actions = (project.actions || []).filter((action) => action.href).map((action) => `
          <a class="button ${action.primary ? "primary" : ""}" href="${escapeHtml(action.href)}">${escapeHtml(action.label)}</a>
        `).join("");
        const components = project.isComponent ? "" : (project.components || []).map((component) => `
          <div class="component-item">
            <strong>${escapeHtml(component.title)}</strong>
            <span>${escapeHtml(component.text)}</span>
          </div>
        `).join("");
        return `
          <article class="project-card" data-card-id="${escapeHtml(project.id || "")}">
            <div class="project-head">
              <h3>${escapeHtml(project.title)}</h3>
              <span class="status ${escapeHtml(project.statusClass || "ok")}">${escapeHtml(project.status)}</span>
            </div>
            <div class="next">${escapeHtml(project.next)}</div>
            ${components ? `<div class="components">${components}</div>` : ""}
            <div class="meta">
              <span>Momentum: ${escapeHtml(project.momentum)}</span>
              <span>${project.folder ? `\u041f\u0430\u043f\u043a\u0430: ${escapeHtml(project.folder)}` : "\u041f\u0430\u043f\u043a\u0430: \u043f\u043e\u043a\u0430 \u043d\u0435 \u043d\u0430\u0437\u043d\u0430\u0447\u0435\u043d\u0430"}</span>
            </div>
            <div class="actions">${actions || '<span class="small">\u041a\u0430\u0440\u0442\u043e\u0447\u043a\u0430 \u0435\u0449\u0451 \u043d\u0435 \u043e\u043f\u0443\u0431\u043b\u0438\u043a\u043e\u0432\u0430\u043d\u0430</span>'}</div>
          </article>
        `;
      }).join("");
    }

    function renderDecisions(decisions) {
      byId("decisions").innerHTML = decisions.map((event) => `
        <div class="event">
          <strong>${escapeHtml(event.title)}</strong>
          ${escapeHtml(event.text)}
        </div>
      `).join("");
    }

    function render(data) {
      currentData = data;
      const projects = data.projects || [];
      const filtered = visibleProjects(projects);
      byId("workspaceDate").textContent = `AI command center · ${data.updated}`;
      renderMetrics(data.metrics || fallbackData.metrics);
      renderFilters(projects);
      renderNav(projects);
      renderCards(filtered);
      renderDecisions(data.decisions || []);
    }

    byId("workspaceHome").addEventListener("click", () => {
      currentFilter = "active";
      currentQuery = "";
      selectedProjectId = "";
      selectedComponentId = "";
      byId("search").value = "";
      render(currentData);
    });

    byId("search").addEventListener("input", (event) => {
      currentQuery = event.target.value;
      render(currentData);
    });

    byId("taskDialog").addEventListener("submit", (event) => {
      event.preventDefault();
      saveTaskDialog();
    });

    byId("taskDialogClose").addEventListener("click", closeTaskDialog);
    byId("taskCancel").addEventListener("click", closeTaskDialog);
    byId("voiceButton").addEventListener("click", startVoiceInput);
    byId("polishButton").addEventListener("click", () => {
      byId("taskEditor").value = normalizeTaskText(byId("taskEditor").value);
      byId("taskEditor").focus();
    });

    fetch("projects.json", { cache: "no-store" })
      .then((response) => response.ok ? response.json() : Promise.reject(new Error("projects.json not found")))
      .then(render)
      .catch(() => render(fallbackData));
  </script>
